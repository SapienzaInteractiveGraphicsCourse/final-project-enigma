<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightning Showroom</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "@tweenjs/tween.js": "https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.esm.js",
            "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/+esm"
        }
        }
    </script>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay" aria-live="polite" aria-busy="true">
        <div class="loading-card">
            <div class="loading-kicker">Lightning Showroom</div>
            <div class="loading-title">Loading</div>
            <div class="loading-bar"><span></span></div>
            <div class="loading-note">Preparing model, HDR and lights. Just a moment.</div>
        </div>
    </div>

    <div class="app-container">
        
        <aside class="sidebar">
            <h2>Dashboard</h2>

            <details class="collapsible-section" closed>
                <summary>Color Customization</summary>
                
                <div class="section-content">
                    <details class="material-row">
                        <summary>Body Paint</summary>
                        <div class="material-top">
                            <div class="color-control">
                                <span>Color</span>
                                <input type="color" id="bodyColorPicker" value="#3ABC2A">
                            </div>
                        </div>
                        <div class="slider-group">
                            <div class="slider-row">
                                <label for="bodyMetallic">Metallic</label>
                                <input type="range" id="bodyMetallic" min="0" max="1" step="0.01" value="0.25">
                            </div>
                            <div class="slider-row">
                                <label for="bodyRoughness">Roughness</label>
                                <input type="range" id="bodyRoughness" min="0" max="1" step="0.01" value="0.45">
                            </div>
                        </div>
                    </details>

                    <details class="material-row">
                        <summary>Rim Paint</summary>
                        <div class="material-top">
                            <div class="color-control">
                                <span>Color</span>
                                <input type="color" id="rimColorPicker" value="#7E7E7E">
                            </div>
                        </div>
                        <div class="slider-group">
                            <div class="slider-row">
                                <label for="rimMetallic">Metallic</label>
                                <input type="range" id="rimMetallic" min="0" max="1" step="0.01" value="0.95">
                            </div>
                            <div class="slider-row">
                                <label for="rimRoughness">Roughness</label>
                                <input type="range" id="rimRoughness" min="0" max="1" step="0.01" value="0.25">
                            </div>
                        </div>
                    </details>

                    <details class="material-row">
                        <summary>Caliper Paint</summary>
                        <div class="material-top">
                            <div class="color-control">
                                <span>Color</span>
                                <input type="color" id="caliperColorPicker" value="#E7303F">
                            </div>
                        </div>
                        <div class="slider-group">
                            <div class="slider-row">
                                <label for="caliperMetallic">Metallic</label>
                                <input type="range" id="caliperMetallic" min="0" max="1" step="0.01" value="0.15">
                            </div>
                            <div class="slider-row">
                                <label for="caliperRoughness">Roughness</label>
                                <input type="range" id="caliperRoughness" min="0" max="1" step="0.01" value="0.35">
                            </div>
                        </div>
                    </details>

                    <details class="material-row compact-material">
                        <summary>Seat Fabric</summary>
                        <div class="material-top">
                            <div class="color-control">
                                <span>Color</span>
                                <input type="color" id="seatColorPicker" value="#E70B00">
                            </div>
                        </div>
                    </details>

                    <details class="material-row compact-material">
                        <summary>Steering Wheel Fabric</summary>
                        <div class="material-top">
                            <div class="color-control">
                                <span>Color</span>
                                <input type="color" id="steeringWheelColorPicker" value="#E70B00">
                            </div>
                        </div>
                    </details>
                </div>
            </details>

            <details class="collapsible-section" closed>
                <summary>Animations</summary>

                <div class="section-content">
                    <label class="toggle-switch">
                        <span>Hood</span>
                        <input type="checkbox" id="checkHood">
                        <div class="slider"></div>
                    </label>

                    <label class="toggle-switch">
                        <span>Rear Wing</span>
                        <input type="checkbox" id="checkSpoiler">
                        <div class="slider"></div>
                    </label>

                    <label class="toggle-switch">
                        <span>Right Door</span>
                        <input type="checkbox" id="checkRightDoor">
                        <div class="slider"></div>
                    </label>

                     <label class="toggle-switch">
                        <span>Right Window</span>
                        <input type="checkbox" id="checkRightWindow">
                        <div class="slider"></div>
                    </label>

                    <label class="toggle-switch">
                        <span>Left Door</span>
                        <input type="checkbox" id="checkLeftDoor">
                        <div class="slider"></div>
                    </label>

                    <label class="toggle-switch">
                        <span>Left Window</span>
                        <input type="checkbox" id="checkLeftWindow">
                        <div class="slider"></div>
                    </label>
                    
                </div>
            </details>

            <details class="collapsible-section" closed>
                <summary>Lights</summary>

                <div class="section-content">
                    <label class="toggle-switch">
                        <span>Running lights</span>
                        <input type="checkbox" id="checkRunningLights">
                        <div class="slider"></div>
                    </label>

                    <label class="toggle-switch">
                        <span>Low beams</span>
                        <input type="checkbox" id="checkLowBeams">
                        <div class="slider"></div>
                    </label>

                    <label class="toggle-switch">
                        <span>High Beams</span>
                        <input type="checkbox" id="checkHighBeams">
                        <div class="slider"></div>
                    </label>

                    <label class="toggle-switch">
                        <span>Right Indicator</span>
                        <input type="checkbox" id="checkRightIndicator">
                        <div class="slider"></div>
                    </label>

                    <label class="toggle-switch">
                        <span>Left Indicator</span>
                        <input type="checkbox" id="checkLeftIndicator">
                        <div class="slider"></div>
                    </label>

                    <label class="toggle-switch">
                        <span>Hazard Lights</span>
                        <input type="checkbox" id="checkHazard">
                        <div class="slider"></div>
                    </label>

                     <label class="toggle-switch">
                        <span>Ambient Light</span>
                        <input type="checkbox" id="checkAmbientLight">
                        <div class="slider"></div>
                    </label>

                    
                </div>
            </details>

            <details class="collapsible-section" closed>
                <summary>Settings</summary>

                <div class="section-content">
                    <label class="toggle-switch">
                        <span>Clickables hover color</span>
                        <input type="checkbox" id="checkClickablesHoverColor">
                        <div class="slider"></div>
                    </label>

                    <label class="toggle-switch">
                        <span>Static Reflections</span>
                        <input type="checkbox" id="checkStaticReflections">
                        <div class="slider"></div>
                    </label>
                </div>
            </details>

            <details class="collapsible-section" closed>
                <summary>Time of Day</summary>
                
                <div class="section-content">
                    <label class="toggle-switch">
                        <span>Night Mode</span>
                        <input type="checkbox" id="checkNightMode">
                        <div class="slider"></div>
                    </label>
                </div>
            </details>

        </aside>

        <main id="canvas-container">

            <div id="fpsCounter" class="fps-counter">FPS: --</div>
            
            <div class="camera-compass">
                <button id="btnViewBack" class="compass-btn" title="Retro">Back</button>
                <button id="btnViewLeft" class="compass-btn" title="Sinistra">Left</button>
                <button id="btnViewTop" class="compass-btn" title="Alto">Top</button>
                <button id="btnViewRight" class="compass-btn" title="Destra">Right</button>
                <button id="btnViewFront" class="compass-btn" title="Fronte">Front</button>
            </div>

            <button id="btnCompassModeToggle" class="compass-mode-btn-long">
                Orbit Camera
            </button>

            <button id="btnViewDriver" class="compass-mode-btn-long" style="margin-top: 40px;">
                Driver View
            </button>

            <button id="btnViewTopDown"  class="compass-mode-btn-long" style="margin-top: 80px;">Drone View</button>

            <button id="btnEnginePower" class="engine-power-btn">
                <span class="engine-text-small">ENGINE</span>
                <span class="engine-text-large" id="engineStatusText">START</span>
            </button>

            <div id="gearSelector" class="gear-selector" aria-label="Gear Selector">
                <button id="gearBtnN" class="gear-btn" data-mode="N">N</button>
                <button id="gearBtnD" class="gear-btn" data-mode="D">D</button>
                <button id="gearBtnR" class="gear-btn" data-mode="R">R</button>
            </div>

            <div id="telemetryDashboard" class="telemetry-dashboard">
                <div class="telemetry-top">
                    <div class="gear-container">
                        <span class="telemetry-label">GEAR</span>
                        <span id="hudGear" class="hud-value-large">N</span>
                    </div>
                    <div class="rpm-container">
                        <span class="telemetry-label">RPM</span>
                        <span id="hudRpm" class="hud-value-large">0</span>
                    </div>
                </div>
                <div class="rev-bar-bg">
                    <div id="revBarFill" class="rev-bar-fill"></div>
                </div>
            </div>

        </main>

    </div>

    <script type="module" src="../../code/script/main.js"></script>
</body>
</html>
