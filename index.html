<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightning Showroom</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "@tweenjs/tween.js": "https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.esm.js"
        }
        }
    </script>
</head>
<body>
    <div class="app-container">
        
        <aside class="sidebar">
            <h2>Dashboard</h2>
            
            <div class="control-group">
                <button id="btnCameraMode">Switch to First Person</button>
            </div>

            <div class="control-group">
                <label for="bodyColorPicker">Body Paint Color</label>
                <input type="color" id="bodyColorPicker" value="#3ABC2AFF">
            </div>

            <div class="control-group">
                <label for="caliperColorPicker">Caliper Paint Color</label>
                <input type="color" id="caliperColorPicker" value="#3ABC2AFF">
            </div>

            <div class="control-group">
                <button id="btnLights">Lights On</button>
            </div>

            <div class="control-group">
                <button id="btnLeftDoor">Left Door</button>
            </div>

            <div class="control-group">
                <button id="btnRightDoor">Right Door</button>
            </div>
        </aside>

        <main id="canvas-container">
            </main>

    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
