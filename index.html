<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightning Showroom</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
        }
    </script>
</head>
<body>
    <div class="app-container">
        
        <aside class="sidebar">
            <h2>Dashboard</h2>
            
            <div class="control-group">
                <button id="btnCameraMode">Switch to First Person</button>
            </div>

            <!-- SEZIONE COLORI A SCOMPARSA (Usa il tag nativo 'details') -->
            <!-- L'attributo 'open' lo fa partire già aperto. Se lo togli, partirà chiuso. -->
            <details class="collapsible-section" open>
                <summary>Car Colors</summary>
                
                <div class="section-content">
                    <div class="color-row">
                        <label for="bodyColorPicker">Body Paint</label>
                        <input type="color" id="bodyColorPicker" value="#3ABC2A">
                    </div>

                    <div class="color-row">
                        <label for="rimColorPicker">Rim Paint</label>
                        <input type="color" id="rimColorPicker" value="#7E7E7E">
                    </div>

                    <div class="color-row">
                        <label for="caliperColorPicker">Caliper Paint</label>
                        <input type="color" id="caliperColorPicker" value="#E7303F">
                    </div>

                    <div class="color-row">
                        <label for="seatColorPicker">Seat Fabric</label>
                        <input type="color" id="seatColorPicker" value="#E70B00">
                    </div>
                </div>
            </details>

            <!-- SEZIONE ANIMAZIONI / AZIONI -->
            <div class="control-group mt-auto">
                <button id="btnLights">Lights On</button>
                <button id="btnLeftDoor">Left Door</button>
                <button id="btnRightDoor">Right Door</button>
            </div>
        </aside>

        <main id="canvas-container">
            <!-- Il canvas di Three.js andrà qui -->
        </main>

    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
