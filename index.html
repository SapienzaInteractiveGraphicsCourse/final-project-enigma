<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightning Showroom</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "@tweenjs/tween.js": "https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.esm.js"
        }
        }
    </script>
</head>
<body>
    <div class="app-container">
        
        <aside class="sidebar">
            <h2>Dashboard</h2>
            
            <div class="control-group">
                <button id="btnCameraMode">Switch to First Person</button>
            </div>

            <details class="collapsible-section" open>
                <summary>Color Customization</summary>
                
                <div class="section-content">
                    <div class="color-row">
                        <label for="bodyColorPicker">Body Paint</label>
                        <input type="color" id="bodyColorPicker" value="#3ABC2A">
                    </div>

                    <div class="color-row">
                        <label for="rimColorPicker">Rim Paint</label>
                        <input type="color" id="rimColorPicker" value="#7E7E7E">
                    </div>

                    <div class="color-row">
                        <label for="caliperColorPicker">Caliper Paint</label>
                        <input type="color" id="caliperColorPicker" value="#E7303F">
                    </div>

                    <div class="color-row">
                        <label for="seatColorPicker">Seat Fabric</label>
                        <input type="color" id="seatColorPicker" value="#E70B00">
                    </div>

                    <div class="color-row">
                        <label for="steeringWheelColorPicker">Steering Wheel Fabric</label>
                        <input type="color" id="steeringWheelColorPicker" value="#E70B00">
                    </div>
                </div>
            </details>

            <details class="collapsible-section" open>
                <summary>Animations</summary>

                <div class="section-content">
                    <label class="toggle-switch">
                        <span>Hood</span>
                        <input type="checkbox" id="checkHood">
                        <div class="slider"></div>
                    </label>

                    <label class="toggle-switch">
                        <span>Rear Wing</span>
                        <input type="checkbox" id="checkSpoiler">
                        <div class="slider"></div>
                    </label>

                    <label class="toggle-switch">
                        <span>Right Door</span>
                        <input type="checkbox" id="checkRightDoor">
                        <div class="slider"></div>
                    </label>

                    <label class="toggle-switch">
                        <span>Left Door</span>
                        <input type="checkbox" id="checkLeftDoor">
                        <div class="slider"></div>
                    </label>

                    
                </div>
            </details>

            <details class="collapsible-section" open>
                <summary>Lights</summary>

                <div class="section-content">
                    <label class="toggle-switch">
                        <span>Low beams</span>
                        <input type="checkbox" id="checkLowBeams">
                        <div class="slider"></div>
                    </label>

                    <label class="toggle-switch">
                        <span>High Beams</span>
                        <input type="checkbox" id="checkHighBeams">
                        <div class="slider"></div>
                    </label>

                    <label class="toggle-switch">
                        <span>Right Indicator</span>
                        <input type="checkbox" id="checkRightIndicator">
                        <div class="slider"></div>
                    </label>

                    <label class="toggle-switch">
                        <span>Left Indicator</span>
                        <input type="checkbox" id="checkLeftIndicator">
                        <div class="slider"></div>
                    </label>

                    
                </div>
            </details>

        </aside>

        <main id="canvas-container">
            <!-- Il canvas di Three.js andrà qui -->
        </main>

    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
